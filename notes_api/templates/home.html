<!DOCTYPE html>
<html>
<head>
    <title>Notes API</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:white;
            padding:40px;
            border-radius:12px;
            text-align:center;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        h1{
            margin-bottom:10px;
        }

        p{
            color:gray;
        }

        a{
            text-decoration:none;
        }

        button{
            width:200px;
            padding:10px;
            margin:10px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
        }

        .register{
            background:#4CAF50;
            color:white;
        }

        .api{
            background:#2196F3;
            color:white;
        }

        .admin{
            background:#ff9800;
            color:white;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>Notes API 🚀</h1>

    <p>Production Ready Django REST API</p>

    <a href="auth-page/">
        <button class="auth-page">Register</button>
    </a>

    <br>

    <a href="/api/">
        <button class="api">API Explorer</button>
    </a>

    <br>

    <a href="/admin/">
        <button class="admin">Admin Panel</button>
    </a>

</div>

</body>
</html>
